<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>ONT Chư Sê</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#1a1a1a;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#f5f5f5}
.topbar{background:#1565C0;padding:12px 16px 10px;position:sticky;top:0;z-index:20}
.topbar-title{font-size:16px;font-weight:700;color:#fff}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4CAF50;margin-right:5px;vertical-align:middle}
.sync-dot.syncing{background:#FFC107;animation:pulse 1s infinite}
.sync-dot.offline{background:#ef5350}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;background:#1565C0;border-bottom:1px solid rgba(255,255,255,.2);position:sticky;top:58px;z-index:19}
.tab{flex:1;padding:11px 4px;font-size:14px;font-weight:600;text-align:center;color:rgba(255,255,255,.65);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom-color:#fff}
.pane{display:none;flex:1;flex-direction:column}
.pane.active{display:flex;flex-direction:column}
.filter-bar{padding:10px 12px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;gap:8px;align-items:center}
.filter-bar select{flex:1;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#f9f9f9;color:#1a1a1a}
.badge-ct{font-size:12px;color:#888;white-space:nowrap;flex-shrink:0}
.list-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:13px 14px;cursor:pointer;border-left:4px solid #e0e0e0;transition:border-left-color .2s}
.card.done{border-left-color:#388E3C}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.card-name{font-size:14px;font-weight:600;color:#0a0a0a;line-height:1.3}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.pill-done{background:#E8F5E9;color:#2E7D32}
.pill-no{background:#F5F5F5;color:#757575}
.card-acc{font-size:12px;color:#888;font-family:monospace;margin-bottom:3px}
.card-loc{font-size:12px;color:#aaa;display:flex;align-items:center;gap:3px}
.card-loc::before{content:"📍";font-size:11px}
.empty{text-align:center;padding:48px 24px;color:#aaa;font-size:14px}
.loading-wrap{text-align:center;padding:48px 24px;color:#888;font-size:14px}

/* SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:14px auto 0}
.sheet-head{padding:14px 16px 12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:flex-start}
.sheet-name{font-size:17px;font-weight:700;color:#0a0a0a;line-height:1.3}
.sheet-acc{font-size:12px;color:#888;font-family:monospace;margin-top:3px}
.sheet-close{background:none;border:none;font-size:26px;color:#ccc;cursor:pointer;padding:0 0 0 12px;line-height:1;flex-shrink:0}
.info-block{padding:4px 16px 12px;border-bottom:1px solid #f0f0f0}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f8f8f8;gap:12px}
.info-row:last-child{border-bottom:none}
.info-lbl{font-size:12px;color:#999;flex-shrink:0;padding-top:1px;min-width:100px}
.info-val{font-size:13px;color:#1a1a1a;font-family:monospace;text-align:right;word-break:break-all}
.info-val.red{color:#C62828;font-weight:600}
.info-val.plain{font-family:inherit}

/* BIG TOGGLE */
.toggle-wrap{padding:16px 16px 8px}
.toggle-btn{width:100%;padding:20px;border-radius:14px;border:none;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s}
.toggle-btn.btn-done{background:#E8F5E9;color:#2E7D32}
.toggle-btn.btn-no{background:#F5F5F5;color:#555}
.toggle-hint{font-size:12px;color:#bbb;text-align:center;margin-top:8px}

.note-wrap{padding:8px 16px 4px}
.note-lbl{font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.note-wrap textarea{width:100%;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fafafa;resize:none;height:72px;outline:none}
.note-wrap textarea:focus{border-color:#1565C0}
.save-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 16px 0;width:calc(100% - 32px);padding:16px;background:#1565C0;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.save-btn:active{opacity:.88}
.save-btn.saving{background:#aaa}

/* DASHBOARD */
.dash-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e8e8}
.stat-lbl{font-size:11px;color:#888;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.stat-n{font-size:28px;font-weight:700}
.stat-n.blue{color:#1565C0}
.stat-n.green{color:#2E7D32}
.prog-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e8e8}
.prog-lbl{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px}
.prog-bg{height:12px;background:#eee;border-radius:6px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:12px;background:#1565C0;border-radius:6px;transition:width .5s ease}
.prog-txt{font-size:14px;color:#555;text-align:right;font-weight:600}
.db-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e8e8}
.db-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5}
.db-row:last-child{border-bottom:none}
.db-name{font-size:13px;color:#1a1a1a;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.db-bar-bg{width:72px;height:6px;background:#eee;border-radius:3px;overflow:hidden;flex-shrink:0}
.db-bar-fill{height:6px;background:#388E3C;border-radius:3px;transition:width .4s}
.db-st{font-size:12px;color:#888;min-width:64px;text-align:right;flex-shrink:0}
.refresh-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1px solid #ddd;border-radius:10px;background:#fff;font-size:13px;color:#555;cursor:pointer;font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:#323232;color:#fff;font-size:13px;font-weight:600;padding:11px 22px;border-radius:24px;opacity:0;transition:all .25s;z-index:300;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

      <div class="info-row"><span class="info-lbl">Mã vật tư</span><span class="info-val" id="s-ma-vt"></span></div>
    </div>
    <div class="toggle-wrap">
      <button class="toggle-btn btn-no" id="toggle-btn" onclick="toggleStatus()">
        <span id="toggle-icon">○</span><span id="toggle-txt">Chưa hoàn thành</span>
      </button>
      <div class="toggle-hint">Bấm nút để đổi trạng thái</div>
    </div>
    <div class="note-wrap">
      <div class="note-lbl">Ghi chú</div>
      <textarea id="s-note" placeholder="Ghi chú thêm (tuỳ chọn)..."></textarea>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveAndClose()">💾 Lưu</button>
  </div>
</div>
<div class="toast" id="toast"></div>

let DATA = [];
let STATE = {}; // {account: {st:0|1, note:'', date:''}}
let cur = null, curSt = 0;
const CACHE_KEY = 'ont_state_v2';
const DATA_KEY  = 'ont_data_v2';

// --- KHỞI ĐỘNG ---
async function init() {
  // Load state từ localStorage trước (offline fallback)
  try { STATE = JSON.parse(localStorage.getItem(CACHE_KEY)||'{}'); } catch(e){}

  // Load data từ localStorage cache
  let cached = null;
  try { cached = JSON.parse(localStorage.getItem(DATA_KEY)); } catch(e){}

  if (cached && cached.length > 0) {
    DATA = cached;
    buildFilters();
    renderList();
  }

  // Nếu chưa có URL Sheets → dùng dữ liệu nhúng
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
    if (DATA.length === 0) {
      DATA = BUILTIN_DATA;
      buildFilters();
      renderList();
    }
    setSyncStatus('offline', 'Chế độ offline (chưa kết nối Sheets)');
    return;
  }

  // Có URL → fetch từ Sheets
  setSyncStatus('syncing', 'Đang kết nối...');
  try {
    const [dataRes, stRes] = await Promise.all([
      fetch(APPS_SCRIPT_URL + '?action=getData'),
      fetch(APPS_SCRIPT_URL + '?action=getStatus')
    ]);
    const dataJson = await dataRes.json();
    const stJson   = await stRes.json();

    if (dataJson.ok && dataJson.data.length > 0) {
      // Map từ header labels → keys
      DATA = dataJson.data.map(r => ({
        account:        r['Account FTTx']       || r['account']        || '',
        ho_ten:         r['Họ và tên thuê bao']  || r['ho_ten']         || '',
        serial_thuc_te: r['Serial thực tế (CTS)']|| r['serial_thuc_te'] || '',
        serial_onebss:  r['Serial OneBSS']       || r['serial_onebss']  || '',
        serial_gp:      r['Serial GP']           || r['serial_gp']      || '',
        dia_ban:        r['Địa Bàn']             || r['dia_ban']        || 'Chưa xác định',
        ma_tb_sai:      r['Mã TB sai (OneBSS)']  || r['ma_tb_sai']      || '',
        ma_vt:          r['Mã vật tư']           || r['ma_vt']          || '',
      }));
      localStorage.setItem(DATA_KEY, JSON.stringify(DATA));
    } else if (DATA.length === 0) {
      DATA = BUILTIN_DATA;
    }

    if (stJson.ok) {
      // Merge: Sheets status > localStorage
      Object.assign(STATE, stJson.status);
      localStorage.setItem(CACHE_KEY, JSON.stringify(STATE));
    }

    buildFilters();
    renderList();
    setSyncStatus('ok', `Đã đồng bộ · ${DATA.length} thuê bao`);
  } catch(err) {
    if (DATA.length === 0) { DATA = BUILTIN_DATA; buildFilters(); renderList(); }
    setSyncStatus('offline', 'Không có mạng – dùng dữ liệu cục bộ');
  }
}

function setSyncStatus(type, msg) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (type==='syncing'?' syncing':type==='offline'?' offline':'');
  document.getElementById('sync-txt').textContent = msg;
}

// --- FILTERS ---
function buildFilters() {
  const dbs = [...new Set(DATA.map(r=>r.dia_ban))].sort();
  const sel = document.getElementById('filter-db');
  sel.innerHTML = '<option value="">📍 Tất cả địa bàn</option>';
  dbs.forEach(d=>{ const o=document.createElement('option'); o.value=d; o.textContent=d; sel.appendChild(o); });
}

// --- LIST ---
function renderList() {
  const dbF = document.getElementById('filter-db').value;
  const stF = document.getElementById('filter-st').value;
  const rows = DATA.filter(r => {
    if (dbF && r.dia_ban !== dbF) return false;
    const s = (STATE[r.account]||{}).st||0;
    if (stF !== '' && String(s) !== stF) return false;
    return true;
  });
  document.getElementById('badge').textContent = rows.length + ' thuê bao';
  const c = document.getElementById('list-body');
  c.innerHTML = '';
  if (!rows.length) { c.innerHTML = '<div class="empty">Không có dữ liệu</div>'; return; }
  rows.forEach(r => {
    const done = ((STATE[r.account]||{}).st||0) === 1;
    const d = document.createElement('div');
    d.className = 'card' + (done?' done':'');
    d.onclick = () => openSheet(r.account);
    d.innerHTML = `<div class="card-top"><span class="card-name">${esc(r.ho_ten)}</span><span class="pill ${done?'pill-done':'pill-no'}">${done?'✓ Hoàn thành':'Chưa xong'}</span></div><div class="card-acc">${esc(r.account)}</div><div class="card-loc">${esc(r.dia_ban)}</div>`;
    c.appendChild(d);
  });
}

// --- SHEET ---
function openSheet(account) {
  const r = DATA.find(x=>x.account===account);
  if (!r) return;
  cur = account;
  curSt = (STATE[account]||{}).st||0;
  document.getElementById('s-name').textContent = r.ho_ten;
  document.getElementById('s-acc').textContent  = r.account;
  document.getElementById('s-db').textContent   = r.dia_ban;
  document.getElementById('s-serial-thuc').textContent = r.serial_thuc_te;
  document.getElementById('s-serial-bss').textContent  = r.serial_onebss + (r.serial_gp?' / '+r.serial_gp:'');
  document.getElementById('s-ma-sai').textContent = r.ma_tb_sai;
  document.getElementById('s-ma-vt').textContent  = r.ma_vt||'—';
  document.getElementById('s-note').value = (STATE[account]||{}).note||'';
  updateToggle();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateToggle() {
  const btn = document.getElementById('toggle-btn');
  if (curSt===1) {
    btn.className='toggle-btn btn-done';
    document.getElementById('toggle-icon').textContent='✓';
    document.getElementById('toggle-txt').textContent='Hoàn thành';
  } else {
    btn.className='toggle-btn btn-no';
    document.getElementById('toggle-icon').textContent='○';
    document.getElementById('toggle-txt').textContent='Chưa hoàn thành';
  }
}
function toggleStatus() { curSt = curSt===1?0:1; updateToggle(); }

async function saveAndClose() {
  if (!cur) return;
  const r = DATA.find(x=>x.account===cur);
  const note = document.getElementById('s-note').value;
  const today = new Date().toLocaleDateString('vi-VN');
  const trangThai = curSt===1 ? 'Hoàn thành' : 'Chưa hoàn thành';

  // Lưu localStorage ngay lập tức
  STATE[cur] = {st:curSt, note:note, date:today};
  localStorage.setItem(CACHE_KEY, JSON.stringify(STATE));
  closeSheet();
  renderList();
  showToast(curSt===1?'✓ Đã lưu: Hoàn thành':'✓ Đã lưu: Chưa hoàn thành');

  // Sync lên Sheets nếu có URL
  if (APPS_SCRIPT_URL && !APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
    try {
      setSyncStatus('syncing','Đang đồng bộ...');
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'updateStatus',
          account: cur,
          dia_ban: r ? r.dia_ban : '',
          trang_thai: trangThai,
          ghi_chu: note
        })
      });
      setSyncStatus('ok','Đã đồng bộ · ' + DATA.length + ' thuê bao');
    } catch(e) {
      setSyncStatus('offline','Lưu cục bộ – chưa sync được');
    }
  }
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function bgClose(e) { if(e.target===document.getElementById('overlay')) closeSheet(); }

// --- DASHBOARD ---
function renderDash() {
  const total = DATA.length;
  let done = 0;
  DATA.forEach(r=>{ if((STATE[r.account]||{}).st===1) done++; });
  const pct = total>0?Math.round(done/total*100):0;
  const dbs = [...new Set(DATA.map(r=>r.dia_ban))].sort();
  const dbSt = {};
  dbs.forEach(d=>dbSt[d]={t:0,d:0});
  DATA.forEach(r=>{ if(dbSt[r.dia_ban]){dbSt[r.dia_ban].t++; if((STATE[r.account]||{}).st===1)dbSt[r.dia_ban].d++;} });
  const sorted = dbs.slice().sort((a,b)=>dbSt[b].t-dbSt[a].t);

  document.getElementById('dash-body').innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-lbl">Tổng thuê bao</div><div class="stat-n blue">${total}</div></div>
      <div class="stat-card"><div class="stat-lbl">Hoàn thành</div><div class="stat-n green">${done}</div></div>
    </div>
    <div class="prog-card">
      <div class="prog-lbl">Tiến độ tổng thể</div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-txt">${pct}% &nbsp;(${done} / ${total})</div>
    </div>
    <button class="refresh-btn" onclick="refreshDash()">🔄 Làm mới từ Sheets</button>
    <div class="db-card">
      <div class="prog-lbl" style="margin-bottom:8px">Theo địa bàn</div>
      ${sorted.map(d=>{
        const {t,d:dn}=dbSt[d];
        const p=t>0?Math.round(dn/t*100):0;
        return `<div class="db-row"><span class="db-name">${esc(d)}</span><div class="db-bar-bg"><div class="db-bar-fill" style="width:${p}%"></div></div><span class="db-st">${dn}/${t} · ${p}%</span></div>`;
      }).join('')}
    </div>`;
}

async function refreshDash() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
    showToast('Chưa kết nối Sheets'); return;
  }
  setSyncStatus('syncing','Đang làm mới...');
  try {
    const [dataRes, stRes] = await Promise.all([
      fetch(APPS_SCRIPT_URL+'?action=getData'),
      fetch(APPS_SCRIPT_URL+'?action=getStatus')
    ]);
    const dj = await dataRes.json();
    const sj = await stRes.json();
    if (dj.ok && dj.data.length>0) {
      DATA = dj.data.map(r=>({
        account: r['Account FTTx']||r['account']||'',
        ho_ten:  r['Họ và tên thuê bao']||r['ho_ten']||'',
        serial_thuc_te: r['Serial thực tế (CTS)']||r['serial_thuc_te']||'',
        serial_onebss:  r['Serial OneBSS']||r['serial_onebss']||'',
        serial_gp:      r['Serial GP']||r['serial_gp']||'',
        dia_ban:        r['Địa Bàn']||r['dia_ban']||'Chưa xác định',
        ma_tb_sai:      r['Mã TB sai (OneBSS)']||r['ma_tb_sai']||'',
        ma_vt:          r['Mã vật tư']||r['ma_vt']||'',
      }));
      localStorage.setItem(DATA_KEY, JSON.stringify(DATA));
      buildFilters();
    }
    if (sj.ok) { Object.assign(STATE, sj.status); localStorage.setItem(CACHE_KEY, JSON.stringify(STATE)); }
    setSyncStatus('ok','Đã đồng bộ · '+DATA.length+' thuê bao');
    renderList(); renderDash();
    showToast('✓ Đã làm mới dữ liệu');
  } catch(e) { setSyncStatus('offline','Không kết nối được'); }
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['list','dash'][i]===t));
  document.getElementById('pane-list').classList.toggle('active',t==='list');
  document.getElementById('pane-dash').classList.toggle('active',t==='dash');
  if(t==='dash') renderDash();
}

function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

init();
</script>
